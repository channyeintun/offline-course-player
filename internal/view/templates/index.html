{{define "index"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Offline Learning Platform</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/htmx.org@1.9.10"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					colors: {
						carbon: {
							gray: {
								10: '#f4f4f4',
								20: '#e0e0e0',
								30: '#c6c6c6',
								70: '#525252',
								80: '#393939',
								90: '#262626',
								100: '#161616',
							},
							blue: {
								60: '#0f62fe',
								70: '#0043ce',
							}
						}
					},
					fontFamily: {
						sans: ['"IBM Plex Sans"', 'ui-sans-serif', 'system-ui'],
					}
				}
			}
		}
	</script>
	<style>
		::-webkit-scrollbar { width: 4px; }
		::-webkit-scrollbar-track { background: #161616; }
		::-webkit-scrollbar-thumb { background-color: #393939; }
		::-webkit-scrollbar-thumb:hover { background-color: #525252; }
		
		body {
			background-color: #161616;
			color: #f4f4f4;
		}
	</style>
</head>
<body class="h-screen overflow-hidden flex flex-col md:flex-row font-sans selection:bg-carbon-blue-60/30">
	
	<!-- Main Player Area -->
	<main class="flex-1 flex flex-col items-center justify-center p-0 md:p-12 bg-black relative z-10 border-r border-carbon-gray-80">
		<div id="player-container" class="w-full max-w-5xl flex flex-col gap-6">
			{{template "player" .}}
		</div>
	</main>

	<!-- Sidebar / Playlist -->
	<aside id="playlist-container" class="w-full md:w-[360px] bg-carbon-gray-100 flex flex-col h-[50vh] md:h-screen shrink-0 border-l border-carbon-gray-80 shadow-xl">
		{{template "playlist" .}}
	</aside>

</body>
</html>
{{end}}
