{{define "player"}}
	{{if .CurrentVideo}}
		<div class="relative w-full aspect-video bg-black ring-1 ring-carbon-gray-80 overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.5)]">
			<video id="video-element" class="w-full h-full outline-none" controls autoplay
				   hx-post="/ended?path={{urlencode .CurrentVideo.Path}}" hx-trigger="ended" hx-target="#player-container">
				<source src="/videos/{{.CurrentVideo.Path}}" type="video/mp4">
				Your browser does not support the video tag.
			</video>
		</div>
		<div class="flex items-center justify-between px-1 mt-6">
			<h1 class="text-2xl font-light tracking-tight text-carbon-gray-10 truncate pr-6">{{formatTitle .CurrentVideo.Name}}</h1>
			{{template "autoplay-btn" .}}
		</div>
	{{else}}
		<div class="w-full aspect-video bg-carbon-gray-90/30 border border-dashed border-carbon-gray-70 flex flex-col items-center justify-center text-carbon-gray-30 gap-6">
			<svg class="w-20 h-20 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
			<p class="text-xl font-light tracking-wide">Select a video to begin the lesson</p>
		</div>
		<div class="flex items-center justify-end mt-6">
			{{template "autoplay-btn" .}}
		</div>
	{{end}}
{{end}}

{{define "autoplay-btn"}}
	<button id="autoplay-btn" hx-post="/autoplay" hx-swap="outerHTML" 
			class="flex items-center gap-4 px-5 py-3 text-sm font-medium transition-all duration-150 focus:outline-none ring-offset-black focus:ring-2 focus:ring-carbon-blue-60
			{{if .AutoPlay}} bg-carbon-blue-60 hover:bg-carbon-blue-70 text-white {{else}} border border-carbon-gray-70 hover:bg-carbon-gray-80 text-carbon-gray-20 {{end}}">
		<span class="tracking-wide">AUTO PLAY</span>
		<span class="text-xs uppercase opacity-70">{{if .AutoPlay}}Active{{else}}Disabled{{end}}</span>
	</button>
{{end}}
