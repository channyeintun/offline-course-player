{{define "player"}}
	{{if .CurrentVideo}}
		<div class="relative w-full aspect-video bg-black border border-carbon-gray-20 overflow-hidden shadow-2xl">
			<video id="vid-{{now}}" class="w-full h-full outline-none" controls {{if .ShouldAutoplay}}autoplay{{end}} preload="auto"
				   onplay="if(!this.dataset.speedSet){ this.playbackRate = parseFloat('{{.Speed}}'); this.dataset.speedSet = 'true'; }"
				   hx-on:htmx:before-swap="this.pause(); this.removeAttribute('src'); this.load();"
				   hx-post="/ended?path={{urlencode .CurrentVideo.Path}}" 
				   hx-trigger="ended delay:200ms" 
				   hx-vals='js:{"speed": document.querySelector("video").playbackRate}'
				   hx-target="#player-container">
				<source src="/videos/{{pathencode .CurrentVideo.Path}}" type="video/mp4">
				Your browser does not support the video tag.
			</video>
		</div>
		<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mt-8 px-1">
			<h1 class="text-2xl font-light tracking-tight text-carbon-gray-100 truncate pr-6 flex-1">{{formatTitle .CurrentVideo.Name}}</h1>
			{{template "autoplay-btn" .}}
		</div>
	{{else}}
		<div class="w-full aspect-video bg-carbon-gray-10 border border-dashed border-carbon-gray-30 flex flex-col items-center justify-center text-carbon-gray-50 gap-6">
			<svg class="w-20 h-20 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
			<p class="text-xl font-light tracking-wide">Select a video to begin the lesson</p>
		</div>
		<div class="flex items-center justify-end mt-8">
			{{template "autoplay-btn" .}}
		</div>
	{{end}}
{{end}}

{{define "autoplay-btn"}}
	<div id="autoplay-btn" 
		 hx-post="/autoplay" 
		 hx-trigger="click" 
		 hx-target="#autoplay-btn"
		 hx-swap="outerHTML"
		 class="group flex items-center gap-3 px-4 py-2 bg-carbon-gray-10/50 border border-carbon-gray-20 cursor-pointer hover:bg-carbon-gray-10 transition-colors">
		<span class="text-[11px] font-semibold text-carbon-gray-70 uppercase tracking-widest select-none">Auto Play</span>
		<div class="relative inline-flex h-6 w-11 items-center transition-colors duration-200 focus:outline-none ring-offset-white focus:ring-2 focus:ring-carbon-blue-60
				{{if .AutoPlay}} bg-carbon-blue-60 {{else}} bg-carbon-gray-30 group-hover:bg-carbon-gray-50 {{end}}">
			<span class="inline-block h-4 w-4 transform bg-white transition-transform duration-200
				{{if .AutoPlay}} translate-x-6 {{else}} translate-x-1 {{end}}"></span>
		</div>
	</div>
{{end}}
